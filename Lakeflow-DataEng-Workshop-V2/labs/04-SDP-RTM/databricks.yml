# Lab 4 — Real-Time Mode for SDP (optional)
# Deployed from the Workspace UI via the Deployments (rocket) icon.
bundle:
  name: sdp-rtm-rate-source

variables:
  catalog_name:
    description: "UC catalog (de_workshop default)"
    default: de_workshop
  schema_name:
    description: "Your USER_ID schema (replace with your own user id)"
    default: default

resources:
  pipelines:
    sdp_rtm_rate_source:
      name: sdp-rtm-rate-source
      catalog: ${var.catalog_name}
      schema: ${var.schema_name}
      dbr_version: custom:18.1.3-delta-pipelines-photon-master-commit-cc3408b-image-13103aa,
      continuous: true
      serverless: true
      channel: PREVIEW
      configuration:
        spark.databricks.streaming.realTimeMode.enabled: "true"
      libraries:
        - file:
            path: ./transformations/temperature_rtm.py

targets:
  prod:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
