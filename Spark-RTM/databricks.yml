bundle:
  name: rtm-demo

variables:
  catalog_volume:
    description: Target catalog for UC volume
    default: main

targets:
  dev:
    default: true
    mode: development
    #workspace:
      #host: https://xxx.cloud.databricks.com/
      #profile: e2-demo-west

resources:
  volumes:
    checkpoint-volume:
      catalog_name: ${var.catalog_volume}
      schema_name: default
      name: spark-rtm-demo
      volume_type: MANAGED
  jobs:
    rtm-demo:
      name: rtm-demo
      parameters:
        - name: checkpointLocation
          default: "/Volumes/${var.catalog_volume}/default/spark-rtm-demo"
        - name: rowsPerSecond
          default: "200"
      tasks:
        - task_key: rtm-demo
          notebook_task:
            notebook_path: ./RTM Demo.ipynb
            base_parameters:
              checkpointLocation: "{{job.parameters.checkpointLocation}}"
              rowsPerSecond: "{{job.parameters.rowsPerSecond}}"
          job_cluster_key: rtm-demo-cluster
          libraries:
            - maven:
                coordinates: org.playframework:play-json_2.13:3.1.0-M3
      job_clusters:
        - job_cluster_key: rtm-demo-cluster
          new_cluster:
            spark_version: 18.1.x-scala2.13
            node_type_id: m6id.4xlarge
            driver_node_type_id: m6id.xlarge
            num_workers: 1
            spark_conf:
              spark.databricks.streaming.realTimeMode.enabled: "true"
            aws_attributes:
              first_on_demand: 2
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              spot_bid_price_percent: 100
              ebs_volume_count: 0
            cluster_log_conf:
              dbfs:
                destination: dbfs:/cluster-logs
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD