resources:
  pipelines:
    gcn_kafka:
      name: "gcn-kafka"

      catalog: ${var.catalog}
      schema: ${var.schema}
      edition: ADVANCED

      # Pipeline source: the SQL transformations in gcn-pipeline/transformations/
      root_path: ../gcn-pipeline
      libraries:
        - glob:
            include: ../gcn-pipeline/transformations/**

      serverless: true
      continuous: false
      photon: true
      channel: CURRENT

      permissions:
        - level: CAN_VIEW
          group_name: "users"
