bundle:
  name: dais-lakeflow-agentbricks

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog the pipeline writes to.
    default: demos1
  schema:
    description: Schema (database) for the streaming tables.
    default: gcn_kafka

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: dbc-34e8a5a4-09d1
    variables:
      catalog: demos1
      schema: gcn_kafka

  prod:
    mode: production
    workspace:
      profile: dbc-34e8a5a4-09d1
    variables:
      catalog: demos1
      schema: gcn_kafka
