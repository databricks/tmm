# yaml-language-server: $schema=bundle_config_schema.json
bundle:
  name: sdp-rtm-rate-source

resources:
  pipelines:
    sdp_rtm_rate_source:
      name: sdp-rtm-rate-source
      catalog: demo
      schema: sdp_rtm_mem_console
      continuous: true
      serverless: true
      channel: PREVIEW
      configuration:
        spark.databricks.streaming.realTimeMode.enabled: "true"
      libraries:
        - file:
            path: ./transformations/temperature_rtm.py
      tags:
        created_by: frank_munz

targets:
  prod:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

