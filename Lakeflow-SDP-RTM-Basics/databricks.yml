# yaml-language-server: $schema=bundle_config_schema.json
bundle:
  name: sdp-rtm-basic

variables:
  catalog_name:
    description: "UC catalog (defaults to main for the standalone demo)"
    default: main
  schema_name:
    description: "UC schema (defaults to default for the standalone demo)"
    default: default

resources:
  pipelines:
    sdp_rtm_basic:
      name: sdp-rtm-basic
      catalog: ${var.catalog_name}
      schema: ${var.schema_name}
      root_path: ./sdp-rtm-basic
      continuous: true
      serverless: true
      channel: PREVIEW
      configuration:
        spark.databricks.streaming.realTimeMode.enabled: "true"
      libraries:
        - file:
            path: ./sdp-rtm-basic/transformations/temperature_rtm.py

targets:
  prod:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
